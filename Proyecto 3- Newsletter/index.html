<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <section class="newsletter">

        <h2>Suscríbete a nuestro Newsletter</h2>
    
        <p>
            Recibe ofertas exclusivas, novedades y consejos para una vida más sostenible.
        </p>
    
        <form>
    
            <input
                type="email"
                placeholder="Ingresa tu correo electrónico"
                required
            >
    
            <button type="submit">
                Suscribirse
            </button>
    
        </form>
    
        <p class="aviso">
            Al suscribirte aceptas nuestra política de privacidad y el tratamiento de tus datos personales.
        </p>
    
    </section>
    
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculadora</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <section class="calculadora">

        

        <form action="resultado.html">
            <h1>Calculadora de Huella de Carbono</h1>
            <h3>Hogar</h3>

            <input type="number" placeholder="Consumo de energía mensual">

            <h3>Transporte</h3>

            <select>
                <option>Automóvil</option>
                <option>Motocicleta</option>
                <option>Bicicleta</option>
                <option>Transporte Público</option>
            </select>

            <input type="number" placeholder="Kilómetros recorridos al mes">

            <button type="submit">
                Calcular Impacto
            </button>

        </form>

    </section>
    
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculadora</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <section class="huella-carbono">

        <h2>Calculadora de Huella de Carbono</h2>
    
        <form>
    
            <h3>Hogar</h3>
    
            <label for="energia">Consumo de energía mensual (kWh)</label>
            <input type="number" id="energia" placeholder="Ej: 250">
    
            <h3>Transporte</h3>
    
            <label for="transporte">Medio de Transporte</label>
            <select id="transporte">
                <option>Automóvil</option>
                <option>Motocicleta</option>
                <option>Bus</option>
                <option>Bicicleta</option>
                <option>Caminando</option>
            </select>
    
            <label for="km">Kilómetros recorridos al mes</label>
            <input type="number" id="km" placeholder="Ej: 500">
    
            <button type="submit">Calcular Impacto</button>
    
        </form>
    
        <div class="resultado">
            <h3>Resultado</h3>
            <p>Impacto total en CO₂: ______ kg/mes</p>
        </div>
    
    </section>
    
</body>
</html>

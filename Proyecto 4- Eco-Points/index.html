<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eco-Points</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <section class="dashboard">

        <h2> Dashboard de Impacto Ambiental</h2>
    
        <div class="dashboard-grid">
    
            <div class="metrica">
                <h3>Árboles Plantados</h3>
                <p class="numero">25</p>
            </div>
    
            <div class="metrica">
                <h3> CO₂ Reducido</h3>
                <p class="numero">120 kg</p>
            </div>
    
            <div class="metrica">
                <h3> Eco-Points</h3>
                <p class="numero">850</p>
            </div>
    
            <div class="metrica">
                <h3> Agua Guardada</h3>
                <p class="numero">500 L</p>
            </div>
    
        </div>
    
    </section>
    
</body>
</html>
